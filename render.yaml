services:
  - type: web
    name: soundbox
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/cabins.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: soundbox-data
      mountPath: /var/data
      sizeGB: 1
